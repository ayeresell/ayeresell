<svg width="900" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#21262d"/>
    </pattern>
    <filter id="orbBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="900" height="160" rx="12"/>
    </clipPath>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2f81f7" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#2f81f7" stop-opacity="1"/>
      <stop offset="75%"  stop-color="#3fb950" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="900" height="160" fill="#0d1117"/>
    <rect width="900" height="160" fill="url(#dots)" opacity="0.6"/>

    <!-- Orb: Swift/blue -->
    <circle cx="140" cy="75" r="110" fill="#2f81f7" opacity="0.13" filter="url(#orbBlur)">
      <animate attributeName="cx" values="140;165;140" dur="9s"  repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="cy" values="75;55;75"   dur="9s"  repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </circle>

    <!-- Orb: Python/orange -->
    <circle cx="490" cy="35" r="90"  fill="#f0883e" opacity="0.11" filter="url(#orbBlur)">
      <animate attributeName="cx" values="490;465;490" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="35;72;35"    dur="11s" repeatCount="indefinite"/>
    </circle>

    <!-- Orb: Go/green -->
    <circle cx="790" cy="105" r="100" fill="#3fb950" opacity="0.12" filter="url(#orbBlur)">
      <animate attributeName="cx" values="790;755;790" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="105;68;105"  dur="10s" repeatCount="indefinite"/>
    </circle>

    <!-- Floating code: import SwiftUI -->
    <text font-family="'SF Mono',ui-monospace,monospace" font-size="13" fill="#58a6ff" filter="url(#glow)" opacity="0">
      <tspan x="60" dy="0">import SwiftUI</tspan>
      <animate attributeName="opacity" values="0;0;0.75;0.75;0" keyTimes="0;0.05;0.2;0.75;1" dur="10s" begin="0s"  repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,95; 0,95; 0,80; 0,65; 0,65" keyTimes="0;0.05;0.2;0.75;1" dur="10s" begin="0s" repeatCount="indefinite"/>
    </text>

    <!-- Floating code: @Observable -->
    <text font-family="'SF Mono',ui-monospace,monospace" font-size="13" fill="#d2a8ff" filter="url(#glow)" opacity="0">
      <tspan x="240" dy="0">@Observable</tspan>
      <animate attributeName="opacity" values="0;0;0.75;0.75;0" keyTimes="0;0.05;0.2;0.75;1" dur="10s" begin="2s"  repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,115; 0,115; 0,100; 0,80; 0,80" keyTimes="0;0.05;0.2;0.75;1" dur="10s" begin="2s" repeatCount="indefinite"/>
    </text>

    <!-- Floating code: func main() {} -->
    <text font-family="'SF Mono',ui-monospace,monospace" font-size="13" fill="#3fb950" filter="url(#glow)" opacity="0">
      <tspan x="430" dy="0">func main() {}</tspan>
      <animate attributeName="opacity" values="0;0;0.75;0.75;0" keyTimes="0;0.05;0.2;0.75;1" dur="10s" begin="1s"  repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,55; 0,55; 0,70; 0,90; 0,90" keyTimes="0;0.05;0.2;0.75;1" dur="10s" begin="1s" repeatCount="indefinite"/>
    </text>

    <!-- Floating code: goroutine -->
    <text font-family="'SF Mono',ui-monospace,monospace" font-size="13" fill="#39d353" filter="url(#glow)" opacity="0">
      <tspan x="640" dy="0">go routine()</tspan>
      <animate attributeName="opacity" values="0;0;0.75;0.75;0" keyTimes="0;0.05;0.2;0.75;1" dur="10s" begin="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,100; 0,100; 0,85; 0,65; 0,65" keyTimes="0;0.05;0.2;0.75;1" dur="10s" begin="3.5s" repeatCount="indefinite"/>
    </text>

    <!-- Floating code: struct Model -->
    <text font-family="'SF Mono',ui-monospace,monospace" font-size="13" fill="#f0883e" filter="url(#glow)" opacity="0">
      <tspan x="760" dy="0">struct Model</tspan>
      <animate attributeName="opacity" values="0;0;0.75;0.75;0" keyTimes="0;0.05;0.2;0.75;1" dur="10s" begin="5s"  repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,50; 0,50; 0,65; 0,85; 0,85" keyTimes="0;0.05;0.2;0.75;1" dur="10s" begin="5s" repeatCount="indefinite"/>
    </text>

    <!-- Bottom gradient line -->
    <rect x="0" y="157" width="900" height="2" fill="url(#lineGrad)"/>
  </g>
</svg>
