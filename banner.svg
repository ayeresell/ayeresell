<svg width="900" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#21262d"/>
    </pattern>
    <clipPath id="clip">
      <rect width="900" height="160" rx="12"/>
    </clipPath>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2f81f7" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#2f81f7"/>
      <stop offset="75%"  stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="o1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2f81f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2f81f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0883e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f0883e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .orb1 { animation: pulse 8s ease-in-out infinite; }
    .orb2 { animation: pulse 11s ease-in-out infinite 1.5s; }
    .orb3 { animation: pulse 9s ease-in-out infinite 3s; }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.4; }
    }

    .c1 { animation: fade 10s ease-in-out infinite 0s; }
    .c2 { animation: fade 10s ease-in-out infinite 2s; }
    .c3 { animation: fade 10s ease-in-out infinite 4s; }
    .c4 { animation: fade 10s ease-in-out infinite 6s; }
    .c5 { animation: fade 10s ease-in-out infinite 8s; }

    @keyframes fade {
      0%,10%  { opacity: 0; }
      25%,65% { opacity: 0.7; }
      80%,100%{ opacity: 0; }
    }
  </style>

  <g clip-path="url(#clip)">
    <rect width="900" height="160" fill="#0d1117"/>
    <rect width="900" height="160" fill="url(#dots)" opacity="0.6"/>

    <!-- Static orbs via radial gradients, only opacity animated -->
    <rect class="orb1" x="0"   y="0" width="320" height="160" fill="url(#o1)"/>
    <rect class="orb2" x="290" y="0" width="320" height="160" fill="url(#o2)"/>
    <rect class="orb3" x="580" y="0" width="320" height="160" fill="url(#o3)"/>

    <!-- Floating code — opacity only, no transform -->
    <text class="c1" x="60"  y="88"  font-family="'SF Mono',ui-monospace,monospace" font-size="13" fill="#58a6ff" opacity="0">import SwiftUI</text>
    <text class="c2" x="240" y="108" font-family="'SF Mono',ui-monospace,monospace" font-size="13" fill="#d2a8ff" opacity="0">@Observable</text>
    <text class="c3" x="420" y="68"  font-family="'SF Mono',ui-monospace,monospace" font-size="13" fill="#3fb950" opacity="0">func main() {}</text>
    <text class="c4" x="620" y="95"  font-family="'SF Mono',ui-monospace,monospace" font-size="13" fill="#39d353" opacity="0">go routine()</text>
    <text class="c5" x="755" y="55"  font-family="'SF Mono',ui-monospace,monospace" font-size="13" fill="#f0883e" opacity="0">struct Model</text>

    <rect x="0" y="157" width="900" height="2" fill="url(#lineGrad)"/>
  </g>
</svg>
